<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Minha Coleção"/>
<meta name="theme-color" content="#080f1a"/>
<title>Minha Coleção de Jogos</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#080f1a;color:#e8f0fe;font-family:system-ui,-apple-system,sans-serif;overscroll-behavior:none}
  input,textarea,select,button{font-family:inherit}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  ::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const DAY = 86400000;
const now = Date.now();

const SAMPLE_GAMES = [
  { id:1, name:"Pandemic", publisher:"Z-Man Games", players:"2-4", time:45, year:2008, rating:9, paid:180, market:220, category:"Cooperativo", notes:"Ótimo para iniciantes", img:"", wantToPlay:false, favorite:true, plays:[{date:now-3*DAY},{date:now-10*DAY},{date:now-20*DAY},{date:now-35*DAY}] },
  { id:2, name:"Catan", publisher:"Devir", players:"3-4", time:90, year:1995, rating:7.5, paid:150, market:175, category:"Estratégia", notes:"", img:"", wantToPlay:true, favorite:false, plays:[{date:now-5*DAY},{date:now-40*DAY}] },
  { id:3, name:"Ticket to Ride", publisher:"Days of Wonder", players:"2-5", time:60, year:2004, rating:8.5, paid:200, market:240, category:"Família", notes:"Perfeito para família", img:"", wantToPlay:false, favorite:true, plays:[{date:now-180*DAY}] },
  { id:4, name:"Wingspan", publisher:"Stonemaier", players:"1-5", time:70, year:2019, rating:9.5, paid:320, market:390, category:"Estratégia", notes:"Arte lindíssima", img:"", wantToPlay:true, favorite:true, plays:[{date:now-1*DAY},{date:now-8*DAY},{date:now-22*DAY},{date:now-30*DAY},{date:now-55*DAY}] },
  { id:5, name:"Dixit", publisher:"Libellud", players:"3-6", time:30, year:2008, rating:8, paid:130, market:148, category:"Party", notes:"", img:"", wantToPlay:false, favorite:false, plays:[{date:now-400*DAY}] },
  { id:6, name:"7 Wonders", publisher:"Repos", players:"2-7", time:30, year:2010, rating:8.5, paid:170, market:195, category:"Drafting", notes:"Ótimo para grupos grandes", img:"", wantToPlay:true, favorite:false, plays:[] },
];
const SAMPLE_WISH = [
  {id:1,name:"Gloomhaven",price:650,priority:"alta",note:"O melhor dungeon crawler"},
  {id:2,name:"Terraforming Mars",price:280,priority:"media",note:"Ótimas avaliações"},
];

const BRL = v => `R$ ${Number(v).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const daysSince = ts => ts ? Math.floor((Date.now()-ts)/DAY) : null;
const fmtDate = ts => ts ? new Date(ts).toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}) : "—";
const LS_GET = (k,fb) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch(e){return fb;} };
const LS_SET = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} };

const C = {
  bg:"#080f1a", surface:"#0f1a2e", card:"#162035", border:"#1e2d45",
  text:"#e8f0fe", muted:"#64748b", dim:"#3a4a60",
  accent:"#3b82f6", accentBg:"#1a2d4a", accentText:"#93c5fd",
  gold:"#f59e0b", goldBg:"#2a1f00",
  green:"#22c55e", greenBg:"#052e16", greenBorder:"#166534",
  purple:"#a78bfa", purpleBg:"#1e1040",
  red:"#f87171", redBg:"#2a0a0a",
};

function Sheet({open,onClose,title,children,footer,tall}){
  if(!open) return null;
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:300,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:C.surface,borderRadius:"20px 20px 0 0",width:"100%",maxHeight:tall?"95vh":"85vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 0"}}>
          <div style={{width:40,height:4,borderRadius:2,background:C.border}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px 12px"}}>
          <div style={{fontSize:17,fontWeight:700,color:C.text}}>{title}</div>
          <button onClick={onClose} style={{background:C.card,border:"none",borderRadius:"50%",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"0 20px 8px"}}>{children}</div>
        {footer&&<div style={{padding:"12px 20px 32px",borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:10}}>{footer}</div>}
      </div>
    </div>
  );
}

function TextInput(props){
  return <input {...props} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 14px",color:C.text,fontSize:15,outline:"none",width:"100%",WebkitAppearance:"none",...props.style}}/>;
}

function Field({label,children}){
  return <div style={{display:"flex",flexDirection:"column",gap:6}}>{label&&<div style={{fontSize:13,color:C.muted,fontWeight:500}}>{label}</div>}{children}</div>;
}

function BigBtn({children,onClick,color=C.accent,bg,border:bc,full}){
  return <button onClick={onClick} style={{background:bg||color+"22",border:`1.5px solid ${bc||color}`,color,borderRadius:14,padding:"15px 20px",fontSize:15,fontWeight:600,cursor:"pointer",width:full?"100%":"auto",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{children}</button>;
}

function Toast({msg}){
  if(!msg) return null;
  return <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:C.greenBg,border:`1px solid ${C.greenBorder}`,color:C.green,padding:"12px 22px",borderRadius:14,fontSize:14,fontWeight:600,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>{msg}</div>;
}

function GameCard({game,onEdit,onToggleWant,onToggleFav,onLogPlay}){
  const lastPlay = game.plays?.length ? Math.max(...game.plays.map(p=>p.date)) : null;
  const days = daysSince(lastPlay);
  const isForgotten = game.plays?.length>0 && days>90;
  const isNever = !game.plays?.length;
  return (
    <div style={{background:C.card,border:`1.5px solid ${game.wantToPlay?C.accent:isForgotten?C.purple+"55":C.border}`,borderRadius:16,overflow:"hidden"}}>
      <div style={{position:"relative"}} onClick={()=>onEdit(game.id)}>
        {game.img
          ? <img src={game.img} alt={game.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}/>
          : null}
        <div style={{width:"100%",aspectRatio:"1",background:C.surface,display:game.img?"none":"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:C.dim}}>
          <span style={{fontSize:36}}>♟</span>
          <span style={{fontSize:11,marginTop:4}}>sem capa</span>
        </div>
        {game.favorite&&<span style={{position:"absolute",top:8,left:8,background:C.goldBg+"ee",color:C.gold,fontSize:13,padding:"3px 8px",borderRadius:10,fontWeight:700}}>★</span>}
        {game.wantToPlay&&<span style={{position:"absolute",top:8,right:8,background:C.accentBg+"ee",color:C.accentText,fontSize:10,padding:"3px 8px",borderRadius:10,fontWeight:600}}>Quero jogar</span>}
        {isForgotten&&<span style={{position:"absolute",bottom:8,left:8,background:C.purpleBg+"ee",color:C.purple,fontSize:10,padding:"3px 8px",borderRadius:10}}>😴 esquecido</span>}
        {isNever&&<span style={{position:"absolute",bottom:8,left:8,background:"#111827ee",color:C.muted,fontSize:10,padding:"3px 8px",borderRadius:10}}>nunca jogado</span>}
      </div>
      <div style={{padding:"10px 12px 4px"}} onClick={()=>onEdit(game.id)}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:3,lineHeight:1.2}}>{game.name}</div>
        <div style={{fontSize:12,color:C.muted,display:"flex",gap:10}}>
          {game.players&&<span>👥 {game.players}</span>}
          {game.time?<span>⏱ {game.time}m</span>:null}
        </div>
        <div style={{fontSize:12,marginTop:3,display:"flex",gap:10}}>
          {game.rating?<span style={{color:C.gold}}>★ {game.rating}</span>:null}
          <span style={{color:C.dim}}>{game.plays?.length||0}× jogado</span>
        </div>
      </div>
      <div style={{display:"flex",gap:6,padding:"8px 10px 10px"}}>
        <button onClick={()=>onLogPlay(game.id)} style={{flex:1.5,padding:"11px 0",borderRadius:10,border:`1.5px solid ${C.greenBorder}`,background:C.greenBg,color:C.green,cursor:"pointer",fontSize:15,fontWeight:700}}>+▶</button>
        <button onClick={()=>onToggleWant(game.id)} style={{flex:1,padding:"11px 0",borderRadius:10,border:`1.5px solid ${game.wantToPlay?C.accent:C.border}`,background:game.wantToPlay?C.accentBg:"transparent",color:game.wantToPlay?C.accent:C.muted,cursor:"pointer",fontSize:15}}>▶</button>
        <button onClick={()=>onToggleFav(game.id)} style={{flex:1,padding:"11px 0",borderRadius:10,border:`1.5px solid ${game.favorite?C.gold:C.border}`,background:game.favorite?C.goldBg:"transparent",color:game.favorite?C.gold:C.muted,cursor:"pointer",fontSize:15}}>★</button>
      </div>
    </div>
  );
}

function GameSheet({open,onClose,game,onSave,onDelete,onLogPlay}){
  const empty={name:"",publisher:"",players:"",time:"",year:"",rating:"",paid:"",market:"",category:"",notes:"",img:""};
  const [form,setForm]=useState(empty);
  const [imgTab,setImgTab]=useState("upload");
  const [selectedImg,setSelectedImg]=useState("");
  const [step,setStep]=useState(0);
  useEffect(()=>{
    if(game){setForm({...empty,...game});setSelectedImg(game.img||"");}
    else{setForm(empty);setSelectedImg("");}
    setStep(0);setImgTab("upload");
  },[game,open]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const imgSrc=selectedImg||form.img;
  const handleSave=()=>{ if(!form.name.trim()) return alert("Informe o nome do jogo."); onSave({...form,img:selectedImg||form.img}); };
  const STEPS=["📷 Capa","ℹ️ Info","💰 Valores"];
  return (
    <Sheet open={open} onClose={onClose} title={game?"Editar jogo":"Novo jogo"} tall
      footer={<>
        {step<2?<BigBtn full color={C.accent} onClick={()=>setStep(s=>s+1)}>Próximo →</BigBtn>:<BigBtn full color={C.green} bg={C.greenBg} border={C.greenBorder} onClick={handleSave}>💾 Salvar jogo</BigBtn>}
        {step>0&&<BigBtn full color={C.muted} onClick={()=>setStep(s=>s-1)}>← Voltar</BigBtn>}
        {game&&step===2&&<BigBtn full color={C.red} bg={C.redBg} border={C.red} onClick={()=>{if(confirm("Remover?"))onDelete(game.id);}}>🗑 Remover da coleção</BigBtn>}
        {game&&<BigBtn full color={C.green} bg={C.greenBg} border={C.greenBorder} onClick={()=>{onLogPlay(game.id);onClose();}}>+▶ Registrar partida agora</BigBtn>}
      </>}>
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {STEPS.map((s,i)=>(
          <button key={i} onClick={()=>setStep(i)} style={{flex:1,padding:"8px 0",borderRadius:10,border:`1.5px solid ${step===i?C.accent:C.border}`,background:step===i?C.accentBg:C.card,color:step===i?C.accentText:C.muted,fontSize:12,fontWeight:step===i?700:400,cursor:"pointer"}}>{s}</button>
        ))}
      </div>
      {step===0&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{width:"100%",height:180,borderRadius:16,border:`1.5px solid ${C.border}`,overflow:"hidden",background:C.card,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {imgSrc?<img src={imgSrc} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:<div style={{color:C.dim,textAlign:"center"}}><div style={{fontSize:48}}>♟</div><div style={{fontSize:13}}>sem imagem</div></div>}
          </div>
          <div style={{display:"flex",gap:6}}>
            {[["upload","📁 Galeria"],["url","🔗 URL"],["bgg","🌐 BGG"]].map(([k,l])=>(
              <button key={k} onClick={()=>setImgTab(k)} style={{flex:1,padding:"10px 0",borderRadius:12,border:`1.5px solid ${imgTab===k?C.accent:C.border}`,background:imgTab===k?C.accentBg:C.card,color:imgTab===k?C.accentText:C.muted,fontSize:13,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
          {imgTab==="upload"&&(
            <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:"28px 20px",border:`1.5px dashed ${C.border}`,borderRadius:16,cursor:"pointer",color:C.muted,fontSize:15,background:C.card}}>
              <span style={{fontSize:32}}>📷</span>
              <span>Tirar foto ou escolher da galeria</span>
              <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{
                const file=e.target.files?.[0];if(!file)return;
                const reader=new FileReader();
                reader.onload=ev=>{setSelectedImg(ev.target.result);set("img",ev.target.result);};
                reader.readAsDataURL(file);
              }}/>
            </label>
          )}
          {imgTab==="url"&&<Field label="URL da imagem"><TextInput value={form.img} onChange={e=>{set("img",e.target.value);setSelectedImg(e.target.value);}} placeholder="https://..." type="url"/></Field>}
          {imgTab==="bgg"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{fontSize:14,color:C.muted,lineHeight:1.7,background:C.card,borderRadius:12,padding:14}}>
                1. Toque no botão abaixo para abrir o BGG<br/>
                2. Encontre o jogo e segure o dedo na capa<br/>
                3. Copie o endereço da imagem<br/>
                4. Volte aqui e cole na aba <strong style={{color:C.text}}>URL</strong>
              </div>
              <a href={`https://boardgamegeek.com/search/boardgame?q=${encodeURIComponent(form.name||"")}`} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"15px",borderRadius:14,border:`1.5px solid ${C.accent}`,background:C.accentBg,color:C.accentText,fontSize:15,textDecoration:"none",fontWeight:600}}>🔍 Abrir BGG ↗</a>
            </div>
          )}
          {imgSrc&&<button onClick={()=>{setSelectedImg("");set("img","");}} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:"4px 0",textAlign:"left"}}>✕ Remover imagem</button>}
        </div>
      )}
      {step===1&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Field label="Nome do jogo *"><TextInput value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Ex: Pandemic" autoFocus/></Field>
          <Field label="Editora"><TextInput value={form.publisher} onChange={e=>set("publisher",e.target.value)} placeholder="Ex: Z-Man Games"/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Jogadores"><TextInput value={form.players} onChange={e=>set("players",e.target.value)} placeholder="Ex: 2-4"/></Field>
            <Field label="Tempo (min)"><TextInput type="number" value={form.time} onChange={e=>set("time",e.target.value)} placeholder="Ex: 60" inputMode="numeric"/></Field>
            <Field label="Ano"><TextInput type="number" value={form.year} onChange={e=>set("year",e.target.value)} placeholder="Ex: 2008" inputMode="numeric"/></Field>
            <Field label="Nota (0–10)"><TextInput type="number" value={form.rating} onChange={e=>set("rating",e.target.value)} placeholder="Ex: 9" min="0" max="10" step="0.5" inputMode="decimal"/></Field>
          </div>
          <Field label="Categoria / Mecânica"><TextInput value={form.category} onChange={e=>set("category",e.target.value)} placeholder="Ex: Cooperativo, Estratégia..."/></Field>
          <Field label="Notas pessoais"><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={3} placeholder="Impressões, com quem joga..." style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 14px",color:C.text,fontSize:15,outline:"none",resize:"vertical",width:"100%"}}/></Field>
        </div>
      )}
      {step===2&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{background:C.card,borderRadius:14,padding:16,fontSize:13,color:C.muted,lineHeight:1.6}}>Registre quanto pagou e o valor atual de mercado. A diferença mostra se valorizou ou não.</div>
          <Field label="Valor pago (R$)"><TextInput type="number" value={form.paid} onChange={e=>set("paid",e.target.value)} placeholder="Ex: 180" inputMode="decimal"/></Field>
          <Field label="Valor de mercado (R$)"><TextInput type="number" value={form.market} onChange={e=>set("market",e.target.value)} placeholder="Ex: 220" inputMode="decimal"/></Field>
          {form.paid&&form.market&&(
            <div style={{background:Number(form.market)>=Number(form.paid)?C.greenBg:C.redBg,border:`1px solid ${Number(form.market)>=Number(form.paid)?C.greenBorder:C.red}`,borderRadius:14,padding:16,textAlign:"center"}}>
              <div style={{fontSize:12,color:C.muted}}>Variação</div>
              <div style={{fontSize:22,fontWeight:700,color:Number(form.market)>=Number(form.paid)?C.green:C.red}}>{Number(form.market)>=Number(form.paid)?"+":""}{BRL(Number(form.market)-Number(form.paid))}</div>
            </div>
          )}
        </div>
      )}
    </Sheet>
  );
}

function WishSheet({open,onClose,onSave}){
  const [form,setForm]=useState({name:"",price:"",priority:"media",note:""});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const pColors={alta:C.red,media:C.gold,baixa:C.green};
  return (
    <Sheet open={open} onClose={onClose} title="Adicionar desejo"
      footer={<BigBtn full color={C.accent} onClick={()=>{if(!form.name.trim())return alert("Informe o nome.");onSave(form);onClose();setForm({name:"",price:"",priority:"media",note:""});}}>Adicionar à lista</BigBtn>}>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Field label="Nome do jogo *"><TextInput value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Ex: Gloomhaven" autoFocus/></Field>
        <Field label="Preço estimado (R$)"><TextInput type="number" value={form.price} onChange={e=>set("price",e.target.value)} placeholder="Ex: 400" inputMode="decimal"/></Field>
        <Field label="Prioridade">
          <div style={{display:"flex",gap:8}}>
            {[["alta","🔴 Alta"],["media","🟡 Média"],["baixa","🟢 Baixa"]].map(([k,l])=>(
              <button key={k} onClick={()=>set("priority",k)} style={{flex:1,padding:"13px 0",borderRadius:12,border:`1.5px solid ${form.priority===k?pColors[k]:C.border}`,background:form.priority===k?pColors[k]+"22":C.card,color:form.priority===k?pColors[k]:C.muted,fontSize:13,cursor:"pointer",fontWeight:form.priority===k?700:400}}>{l}</button>
            ))}
          </div>
        </Field>
        <Field label="Observação"><TextInput value={form.note} onChange={e=>set("note",e.target.value)} placeholder="Por que quer esse jogo?"/></Field>
      </div>
    </Sheet>
  );
}

function StatsPage({games,onLogPlay}){
  const [section,setSection]=useState("jogados");
  const withPlays=games.filter(g=>g.plays?.length>0);
  const neverPlayed=games.filter(g=>!g.plays?.length);
  const recentCutoff=Date.now()-30*DAY;
  const forgotten=withPlays.filter(g=>daysSince(Math.max(...g.plays.map(p=>p.date)))>90);
  const recentlyPlayed=withPlays.filter(g=>Math.max(...g.plays.map(p=>p.date))>recentCutoff).sort((a,b)=>Math.max(...b.plays.map(p=>p.date))-Math.max(...a.plays.map(p=>p.date)));
  const byPlays=[...withPlays].sort((a,b)=>b.plays.length-a.plays.length);
  const maxPlays=byPlays[0]?.plays.length||1;
  const topRated=[...games].filter(g=>g.rating).sort((a,b)=>b.rating-a.rating).slice(0,6);
  const catMap={};games.forEach(g=>{const c=g.category||"Sem categoria";catMap[c]=(catMap[c]||0)+1;});
  const sortedCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=sortedCats[0]?.[1]||1;
  const totalPlays=games.reduce((a,g)=>a+(g.plays?.length||0),0);
  const pills=[["jogados","🎲 Mais jogados"],["recentes","🕐 Este mês"],["esquecidos","😴 Esquecidos"],["nunca","📦 Nunca jogados"],["categorias","🗂 Categorias"],["notas","⭐ Notas"]];
  const GameRow=({g,right})=>{
    const last=g.plays?.length?Math.max(...g.plays.map(p=>p.date)):null;
    return(
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
        {g.img?<img src={g.img} alt={g.name} style={{width:44,height:44,borderRadius:10,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>:<div style={{width:44,height:44,borderRadius:10,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>♟</div>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.name}</div>
          {last&&<div style={{fontSize:12,color:C.muted}}>última: {fmtDate(last)}</div>}
        </div>
        <div style={{fontSize:14,fontWeight:600,color:C.muted,flexShrink:0}}>{right}</div>
        <button onClick={()=>onLogPlay(g.id)} style={{padding:"8px 12px",borderRadius:10,border:`1.5px solid ${C.greenBorder}`,background:C.greenBg,color:C.green,cursor:"pointer",fontSize:13,fontWeight:700,flexShrink:0}}>+▶</button>
      </div>
    );
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[[C.accent,"Total de partidas",totalPlays],[C.gold,"Nunca jogados",neverPlayed.length],[C.purple,"Esquecidos",forgotten.length],[C.green,"Jogados este mês",recentlyPlayed.length]].map(([color,label,val])=>(
          <div key={label} style={{background:C.card,border:`1px solid ${color}33`,borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:12,color:C.muted}}>{label}</div>
            <div style={{fontSize:26,fontWeight:700,color,marginTop:4}}>{val}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
        {pills.map(([k,l])=>(
          <button key={k} onClick={()=>setSection(k)} style={{flexShrink:0,padding:"9px 16px",borderRadius:20,fontSize:13,cursor:"pointer",border:`1.5px solid ${section===k?C.accent:C.border}`,background:section===k?C.accentBg:"transparent",color:section===k?C.accentText:C.muted,fontWeight:section===k?700:400}}>{l}</button>
        ))}
      </div>
      <div style={{background:C.card,borderRadius:16,padding:"4px 16px 4px"}}>
        {section==="jogados"&&(byPlays.length===0?<div style={{textAlign:"center",padding:"2rem 0",color:C.muted}}>Nenhuma partida ainda. Use +▶ nos cards!</div>:byPlays.map((g,i)=>(
          <div key={g.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:15,color:i<3?C.gold:C.dim,width:22,textAlign:"center",fontWeight:700}}>{i+1}</div>
            {g.img?<img src={g.img} alt={g.name} style={{width:40,height:40,borderRadius:8,objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:<div style={{width:40,height:40,borderRadius:8,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>♟</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.name}</div>
              <div style={{marginTop:4,height:5,background:C.surface,borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:3,background:C.accent,width:`${Math.round(g.plays.length/maxPlays*100)}%`}}/>
              </div>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:C.muted,minWidth:36,textAlign:"right"}}>{g.plays.length}×</div>
          </div>
        )))}
        {section==="recentes"&&(recentlyPlayed.length===0?<div style={{textAlign:"center",padding:"2rem 0",color:C.muted}}>Nenhum jogo este mês.</div>:recentlyPlayed.map(g=><GameRow key={g.id} g={g} right={`${g.plays.filter(p=>p.date>recentCutoff).length}× este mês`}/>))}
        {section==="esquecidos"&&(forgotten.length===0?<div style={{textAlign:"center",padding:"2rem 0",color:C.green}}>🎉 Nenhum jogo esquecido!</div>:[...forgotten].sort((a,b)=>Math.max(...a.plays.map(p=>p.date))-Math.max(...b.plays.map(p=>p.date))).map(g=><GameRow key={g.id} g={g} right={`${daysSince(Math.max(...g.plays.map(p=>p.date)))}d`}/>))}
        {section==="nunca"&&(neverPlayed.length===0?<div style={{textAlign:"center",padding:"2rem 0",color:C.green}}>🎉 Todos já foram jogados!</div>:neverPlayed.map(g=><GameRow key={g.id} g={g} right={g.year||""}/>))}
        {section==="categorias"&&sortedCats.map(([cat,cnt])=>(
          <div key={cat} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:14,color:C.text,width:120,flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cat}</div>
            <div style={{flex:1,height:8,background:C.surface,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:"#8b5cf6",width:`${Math.round(cnt/maxCat*100)}%`}}/></div>
            <div style={{fontSize:14,fontWeight:600,color:C.muted,minWidth:20,textAlign:"right"}}>{cnt}</div>
          </div>
        ))}
        {section==="notas"&&topRated.map((g,i)=>(
          <div key={g.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:15,color:i<3?C.gold:C.dim,width:22,textAlign:"center",fontWeight:700}}>{i+1}</div>
            {g.img?<img src={g.img} alt={g.name} style={{width:40,height:40,borderRadius:8,objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:<div style={{width:40,height:40,borderRadius:8,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>♟</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.name}</div>
              <div style={{marginTop:4,height:5,background:C.surface,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:C.gold,width:`${Math.round(g.rating/10*100)}%`}}/></div>
            </div>
            <div style={{fontSize:16,fontWeight:700,color:C.gold}}>{g.rating}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ValuePage({games,onSaveGames}){
  const [editId,setEditId]=useState(null);
  const [editVal,setEditVal]=useState("");
  const totalValue=games.reduce((a,g)=>a+(g.market||g.paid||0),0);
  const totalPaid=games.reduce((a,g)=>a+(g.paid||0),0);
  const totalMarket=games.reduce((a,g)=>a+(g.market||0),0);
  const diff=totalMarket-totalPaid;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:C.card,borderRadius:16,padding:"20px 18px"}}>
        <div style={{fontSize:13,color:C.muted}}>Valor total da coleção</div>
        <div style={{fontSize:34,fontWeight:700,color:C.text,margin:"6px 0"}}>{BRL(totalValue)}</div>
        <div style={{display:"flex",gap:0,marginTop:12,background:C.surface,borderRadius:12,overflow:"hidden"}}>
          {[[C.muted,"Pago",BRL(totalPaid)],[C.accent,"Mercado",BRL(totalMarket)],[diff>=0?C.green:C.red,diff>=0?"Valorização":"Desvalorização",(diff>=0?"+":"")+BRL(diff)]].map(([color,label,val],i)=>(
            <div key={i} style={{flex:1,padding:"12px 10px",borderLeft:i>0?`1px solid ${C.border}`:"none",textAlign:"center"}}>
              <div style={{fontSize:11,color:C.muted}}>{label}</div>
              <div style={{fontSize:13,fontWeight:700,color,marginTop:3}}>{val}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {[...games].sort((a,b)=>(b.market||b.paid||0)-(a.market||a.paid||0)).map(g=>(
          <div key={g.id} style={{background:C.card,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
            {g.img?<img src={g.img} alt={g.name} style={{width:44,height:44,borderRadius:10,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>:<div style={{width:44,height:44,borderRadius:10,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>♟</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.name}</div>
              <div style={{fontSize:12,color:C.dim}}>{g.paid?`pago: ${BRL(g.paid)}`:""}</div>
            </div>
            {editId===g.id
              ?<div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input type="number" value={editVal} onChange={e=>setEditVal(e.target.value)} inputMode="decimal" style={{width:90,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 10px",color:C.text,fontSize:14,outline:"none"}} autoFocus/>
                  <button onClick={()=>{const v=parseFloat(editVal);if(!isNaN(v))onSaveGames(games.map(x=>x.id===g.id?{...x,market:v}:x));setEditId(null);}} style={{padding:"8px 14px",borderRadius:10,border:`1.5px solid ${C.accent}`,background:C.accentBg,color:C.accentText,cursor:"pointer",fontSize:13,fontWeight:700}}>Ok</button>
                </div>
              :<div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>{BRL(g.market||g.paid||0)}</div>
                  <button onClick={()=>{setEditId(g.id);setEditVal(g.market||g.paid||"");}} style={{background:C.surface,border:"none",borderRadius:8,padding:"6px 10px",color:C.muted,cursor:"pointer",fontSize:14}}>✎</button>
                </div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [games,setGames]=useState(()=>LS_GET("bgc_games_v5",SAMPLE_GAMES));
  const [wishlist,setWishlist]=useState(()=>LS_GET("bgc_wish_v5",SAMPLE_WISH));
  const [tab,setTab]=useState("colecao");
  const [filter,setFilter]=useState("todos");
  const [search,setSearch]=useState("");
  const [gameSheet,setGameSheet]=useState(false);
  const [wishSheet,setWishSheet]=useState(false);
  const [editGame,setEditGame]=useState(null);
  const [toast,setToast]=useState(null);

  const saveGames=useCallback(g=>{setGames(g);LS_SET("bgc_games_v5",g);},[]);
  const saveWish=useCallback(w=>{setWishlist(w);LS_SET("bgc_wish_v5",w);},[]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const logPlay=useCallback(id=>{
    const updated=games.map(g=>g.id===id?{...g,plays:[...(g.plays||[]),{date:Date.now()}]}:g);
    saveGames(updated);
    showToast("✓ Partida de "+(games.find(g=>g.id===id)?.name||"")+" registrada!");
  },[games,saveGames]);

  const openEdit=id=>{setEditGame(games.find(g=>g.id===id)||null);setGameSheet(true);};
  const handleSaveGame=data=>{
    if(editGame)saveGames(games.map(g=>g.id===editGame.id?{...g,...data}:g));
    else saveGames([...games,{...data,id:Date.now(),wantToPlay:false,favorite:false,plays:[]}]);
    setGameSheet(false);
  };
  const handleDelete=id=>{saveGames(games.filter(g=>g.id!==id));setGameSheet(false);};

  const filtered=games.filter(g=>{
    if(filter==="quero"&&!g.wantToPlay)return false;
    if(filter==="favoritos"&&!g.favorite)return false;
    if(search&&!g.name.toLowerCase().includes(search.toLowerCase())&&!(g.category||"").toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const totalValue=games.reduce((a,g)=>a+(g.market||g.paid||0),0);
  const totalPlays=games.reduce((a,g)=>a+(g.plays?.length||0),0);
  const avgRating=games.length?games.reduce((a,g)=>a+(g.rating||0),0)/games.length:0;

  const NAV=[{key:"colecao",icon:"♟",label:"Coleção"},{key:"stats",icon:"📊",label:"Stats"},{key:"valor",icon:"💰",label:"Valor"},{key:"desejos",icon:"⭐",label:"Desejos"}];

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"system-ui,-apple-system,sans-serif",fontSize:15,maxWidth:480,margin:"0 auto",position:"relative"}}>
      <Toast msg={toast}/>
      <div style={{background:C.surface,padding:"16px 20px 14px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:tab==="colecao"?12:0}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>♟ Minha coleção</div>
          {tab==="colecao"&&<button onClick={()=>{setEditGame(null);setGameSheet(true);}} style={{background:C.accent,border:"none",borderRadius:12,padding:"9px 18px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Adicionar</button>}
          {tab==="desejos"&&<button onClick={()=>setWishSheet(true)} style={{background:C.accent,border:"none",borderRadius:12,padding:"9px 18px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Adicionar</button>}
        </div>
        {tab==="colecao"&&(
          <div style={{display:"flex",gap:8}}>
            {[[games.length,"jogos"],[totalPlays,"partidas"],[avgRating.toFixed(1),"nota média"]].map(([v,l])=>(
              <div key={l} style={{flex:1,background:C.card,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:700,color:C.text}}>{v}</div>
                <div style={{fontSize:11,color:C.muted}}>{l}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{padding:"16px 16px 90px"}}>
        {tab==="colecao"&&(
          <>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Buscar jogo ou categoria..." style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 16px",color:C.text,fontSize:15,outline:"none",width:"100%",WebkitAppearance:"none"}}/>
              <div style={{display:"flex",gap:8}}>
                {[["todos","Todos"],["quero","▶ Quero jogar"],["favoritos","★ Favoritos"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setFilter(k)} style={{flex:1,padding:"9px 0",borderRadius:12,fontSize:13,cursor:"pointer",border:`1.5px solid ${filter===k?C.accent:C.border}`,background:filter===k?C.accentBg:"transparent",color:filter===k?C.accentText:C.muted,fontWeight:filter===k?700:400}}>{l}</button>
                ))}
              </div>
            </div>
            {filtered.length===0
              ?<div style={{textAlign:"center",padding:"4rem 0",color:C.muted}}><div style={{fontSize:40}}>♟</div><div style={{marginTop:10}}>Nenhum jogo encontrado</div></div>
              :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {filtered.map(g=><GameCard key={g.id} game={g} onEdit={openEdit} onToggleWant={id=>saveGames(games.map(g=>g.id===id?{...g,wantToPlay:!g.wantToPlay}:g))} onToggleFav={id=>saveGames(games.map(g=>g.id===id?{...g,favorite:!g.favorite}:g))} onLogPlay={logPlay}/>)}
              </div>}
          </>
        )}
        {tab==="stats"&&<StatsPage games={games} onLogPlay={logPlay}/>}
        {tab==="valor"&&<ValuePage games={games} onSaveGames={saveGames}/>}
        {tab==="desejos"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {wishlist.length===0
              ?<div style={{textAlign:"center",padding:"4rem 0",color:C.muted,fontSize:15}}><div style={{fontSize:40,marginBottom:10}}>⭐</div><div>Lista vazia.</div><div style={{marginTop:6,fontSize:13}}>Adicione jogos que quer comprar!</div></div>
              :wishlist.map(w=>{
                const pColor={alta:C.red,media:C.gold,baixa:C.green};
                return(
                  <div key={w.id} style={{background:C.card,borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:14,height:14,borderRadius:"50%",background:pColor[w.priority],flexShrink:0}}/>
                    <div style={{flex:1}}><div style={{fontSize:15,fontWeight:600,color:C.text}}>{w.name}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{w.price?BRL(w.price)+" · ":""}{w.note}</div></div>
                    <button onClick={()=>saveWish(wishlist.filter(x=>x.id!==w.id))} style={{background:C.surface,border:"none",borderRadius:8,padding:"6px 10px",color:C.muted,cursor:"pointer",fontSize:16}}>✕</button>
                  </div>
                );
              })}
          </div>
        )}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:50,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {NAV.map(({key,icon,label})=>(
          <button key={key} onClick={()=>setTab(key)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"12px 0 10px",background:"none",border:"none",cursor:"pointer",color:tab===key?C.accent:C.muted}}>
            <span style={{fontSize:20}}>{icon}</span>
            <span style={{fontSize:11,fontWeight:tab===key?700:400,fontFamily:"inherit"}}>{label}</span>
            {tab===key&&<div style={{width:20,height:2,borderRadius:1,background:C.accent,marginTop:2}}/>}
          </button>
        ))}
      </div>
      <GameSheet open={gameSheet} onClose={()=>setGameSheet(false)} game={editGame} onSave={handleSaveGame} onDelete={handleDelete} onLogPlay={logPlay}/>
      <WishSheet open={wishSheet} onClose={()=>setWishSheet(false)} onSave={data=>{saveWish([...wishlist,{...data,id:Date.now()}]);}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
