<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Coleção"/>
<meta name="theme-color" content="#080f1a"/>
<title>Minha Coleção de Jogos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080f1a;color:#e8f0fe;font-family:system-ui,-apple-system,sans-serif;font-size:15px;overscroll-behavior:none}
input,textarea,select,button{font-family:inherit;font-size:15px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
button{cursor:pointer;border:none;background:none;color:inherit}
img{display:block}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* layout */
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* header */
.header{background:#0f1a2e;padding:14px 18px;border-bottom:1px solid #1e2d45;position:sticky;top:0;z-index:10}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.logo{font-size:17px;font-weight:800;color:#e8f0fe}
.btn-add{background:#3b82f6;border-radius:12px;padding:9px 18px;color:#fff;font-size:14px;font-weight:700}
.stats-strip{display:flex;gap:8px;margin-top:12px}
.stat-pill{flex:1;background:#162035;border-radius:10px;padding:8px 10px;text-align:center}
.stat-pill .val{font-size:16px;font-weight:700;color:#e8f0fe}
.stat-pill .lbl{font-size:11px;color:#64748b}

/* bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0f1a2e;border-top:1px solid #1e2d45;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 0 9px;color:#64748b;font-size:11px;font-weight:400}
.nav-btn.active{color:#3b82f6;font-weight:700}
.nav-btn .ico{font-size:20px}
.nav-dot{width:18px;height:2px;border-radius:1px;background:#3b82f6;margin-top:2px}

/* content */
.content{padding:14px 14px 88px}

/* search + filters */
.search-box{width:100%;background:#162035;border:1px solid #1e2d45;border-radius:14px;padding:13px 16px;color:#e8f0fe;outline:none;margin-bottom:10px}
.filter-row{display:flex;gap:8px;margin-bottom:14px}
.filter-btn{flex:1;padding:9px 0;border-radius:12px;font-size:13px;border:1.5px solid #1e2d45;background:transparent;color:#64748b;font-weight:400}
.filter-btn.active{border-color:#3b82f6;background:#1a2d4a;color:#93c5fd;font-weight:700}

/* game grid */
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.game-card{background:#162035;border:1.5px solid #1e2d45;border-radius:16px;overflow:hidden}
.game-card.want{border-color:#3b82f6}
.game-card.forgotten{border-color:#a78bfa55}
.game-cover{position:relative;width:100%;aspect-ratio:1;background:#0f1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#3a4a60;overflow:hidden}
.game-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px}
.badge{position:absolute;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600}
.badge-fav{top:8px;left:8px;background:#2a1f00ee;color:#f59e0b}
.badge-want{top:8px;right:8px;background:#1a2d4aee;color:#93c5fd}
.badge-bot{bottom:8px;left:8px}
.badge-forgot{background:#1e1040ee;color:#a78bfa}
.badge-never{background:#111827ee;color:#64748b}
.game-info{padding:10px 12px 4px;cursor:pointer}
.game-name{font-size:14px;font-weight:700;color:#e8f0fe;line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-meta{font-size:12px;color:#64748b;display:flex;gap:10px}
.game-sub{font-size:12px;margin-top:3px;display:flex;gap:10px}
.game-actions{display:flex;gap:6px;padding:8px 10px 10px}
.act-play{flex:1.5;padding:11px 0;border-radius:10px;border:1.5px solid #166534;background:#052e16;color:#22c55e;font-size:15px;font-weight:700}
.act-want{flex:1;padding:11px 0;border-radius:10px;border:1.5px solid #1e2d45;background:transparent;color:#64748b;font-size:15px}
.act-want.active{border-color:#3b82f6;background:#1a2d4a;color:#3b82f6}
.act-fav{flex:1;padding:11px 0;border-radius:10px;border:1.5px solid #1e2d45;background:transparent;color:#64748b;font-size:15px}
.act-fav.active{border-color:#f59e0b;background:#2a1f00;color:#f59e0b}

/* sheet */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end}
.sheet-backdrop.hidden{display:none}
.sheet{background:#0f1a2e;border-radius:20px 20px 0 0;width:100%;max-height:93vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,0.6)}
.sheet-handle{display:flex;justify-content:center;padding:12px 0 0}
.sheet-handle div{width:40px;height:4px;border-radius:2px;background:#1e2d45}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 12px}
.sheet-title{font-size:17px;font-weight:700;color:#e8f0fe}
.sheet-close{background:#162035;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:18px}
.sheet-body{overflow-y:auto;flex:1;padding:0 20px 8px}
.sheet-footer{padding:12px 20px 32px;border-top:1px solid #1e2d45;display:flex;flex-direction:column;gap:10px}

/* form */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:13px;color:#64748b;font-weight:500}
.finput{width:100%;background:#162035;border:1px solid #1e2d45;border-radius:12px;padding:13px 14px;color:#e8f0fe;outline:none;-webkit-appearance:none}
textarea.finput{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* big buttons */
.bbtn{width:100%;border-radius:14px;padding:15px 20px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid}
.bbtn-blue{background:#1a2d4a;border-color:#3b82f6;color:#3b82f6}
.bbtn-green{background:#052e16;border-color:#166534;color:#22c55e}
.bbtn-gray{background:transparent;border-color:#3a4a60;color:#64748b}
.bbtn-red{background:#2a0a0a;border-color:#f87171;color:#f87171}

/* step tabs */
.steps{display:flex;gap:6px;margin-bottom:20px}
.step-btn{flex:1;padding:8px 0;border-radius:10px;font-size:12px;border:1.5px solid #1e2d45;background:#162035;color:#64748b}
.step-btn.active{border-color:#3b82f6;background:#1a2d4a;color:#93c5fd;font-weight:700}

/* img source tabs */
.imgtabs{display:flex;gap:6px;margin-bottom:12px}
.imgtab{flex:1;padding:10px 0;border-radius:12px;font-size:13px;border:1.5px solid #1e2d45;background:#162035;color:#64748b}
.imgtab.active{border-color:#3b82f6;background:#1a2d4a;color:#93c5fd}

/* cover preview */
.cover-preview{width:100%;height:170px;border-radius:16px;border:1.5px solid #1e2d45;background:#162035;display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;position:relative}
.cover-preview img{width:100%;height:100%;object-fit:cover}
.cover-preview .ph{color:#3a4a60;text-align:center}

/* upload label */
.upload-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px 20px;border:1.5px dashed #1e2d45;border-radius:16px;background:#162035;color:#64748b;font-size:14px}

/* priority btns */
.pri-row{display:flex;gap:8px}
.pri-btn{flex:1;padding:13px 0;border-radius:12px;font-size:13px;border:1.5px solid #1e2d45;background:#162035;color:#64748b}

/* stats */
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#162035;border-radius:14px;padding:14px 16px}
.stat-card .sc-val{font-size:26px;font-weight:700;margin-top:4px}
.stat-card .sc-lbl{font-size:12px;color:#64748b}
.pill-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.pill{flex-shrink:0;padding:9px 16px;border-radius:20px;font-size:13px;border:1.5px solid #1e2d45;background:transparent;color:#64748b;font-weight:400}
.pill.active{border-color:#3b82f6;background:#1a2d4a;color:#93c5fd;font-weight:700}
.section-box{background:#162035;border-radius:16px;padding:4px 16px}
.game-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #1e2d45}
.game-row:last-child{border-bottom:none}
.row-thumb{width:44px;height:44px;border-radius:10px;background:#0f1a2e;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.row-thumb img{width:100%;height:100%;object-fit:cover}
.row-info{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:600;color:#e8f0fe;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:12px;color:#64748b;margin-top:1px}
.row-right{font-size:14px;font-weight:600;color:#64748b;flex-shrink:0}
.btn-log{padding:8px 12px;border-radius:10px;border:1.5px solid #166534;background:#052e16;color:#22c55e;font-size:13px;font-weight:700;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #1e2d45}
.bar-row:last-child{border-bottom:none}
.bar-track{flex:1;height:7px;background:#0f1a2e;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.rank-num{font-size:15px;width:22px;text-align:center;font-weight:700;flex-shrink:0}

/* value */
.value-hero{background:#162035;border-radius:16px;padding:20px 18px;margin-bottom:14px}
.value-total-lbl{font-size:13px;color:#64748b}
.value-total{font-size:34px;font-weight:700;color:#e8f0fe;margin:6px 0}
.value-breakdown{display:flex;background:#0f1a2e;border-radius:12px;overflow:hidden;margin-top:12px}
.vb-item{flex:1;padding:12px 10px;text-align:center}
.vb-item+.vb-item{border-left:1px solid #1e2d45}
.vb-lbl{font-size:11px;color:#64748b}
.vb-val{font-size:13px;font-weight:700;margin-top:3px}
.val-row{background:#162035;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.val-edit-inp{width:90px;background:#0f1a2e;border:1px solid #1e2d45;border-radius:10px;padding:8px 10px;color:#e8f0fe;font-size:14px;outline:none}
.val-ok{padding:8px 14px;border-radius:10px;border:1.5px solid #3b82f6;background:#1a2d4a;color:#93c5fd;font-size:13px;font-weight:700}
.val-edit-btn{background:#0f1a2e;border-radius:8px;padding:6px 10px;color:#64748b;font-size:14px}

/* wish */
.wish-row{background:#162035;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.wish-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.wish-name{font-size:15px;font-weight:600;color:#e8f0fe}
.wish-sub{font-size:12px;color:#64748b;margin-top:2px}
.wish-del{background:#0f1a2e;border-radius:8px;padding:6px 10px;color:#64748b;font-size:16px}

/* toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#052e16;border:1px solid #166534;color:#22c55e;padding:12px 22px;border-radius:14px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:none}
.toast.show{display:block}

/* empty */
.empty{text-align:center;padding:4rem 0;color:#64748b}
.empty .ico{font-size:40px;margin-bottom:10px}

/* bgg tip */
.bgg-tip{font-size:14px;color:#64748b;line-height:1.7;background:#162035;border-radius:12px;padding:14px;margin-bottom:12px}
.bgg-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:14px;border:1.5px solid #3b82f6;background:#1a2d4a;color:#93c5fd;font-size:15px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-row">
      <div class="logo">♟ Minha coleção</div>
      <button class="btn-add" id="btn-header-add" onclick="openAddGame()">+ Adicionar</button>
    </div>
    <div class="stats-strip" id="stats-strip"></div>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav" id="nav"></nav>
</div>

<!-- SHEET: add/edit game -->
<div class="sheet-backdrop hidden" id="game-sheet" onclick="if(event.target===this)closeGameSheet()">
  <div class="sheet">
    <div class="sheet-handle"><div></div></div>
    <div class="sheet-head">
      <div class="sheet-title" id="game-sheet-title">Novo jogo</div>
      <button class="sheet-close" onclick="closeGameSheet()">✕</button>
    </div>
    <div class="sheet-body" id="game-sheet-body"></div>
    <div class="sheet-footer" id="game-sheet-footer"></div>
  </div>
</div>

<!-- SHEET: wish -->
<div class="sheet-backdrop hidden" id="wish-sheet" onclick="if(event.target===this)closeWishSheet()">
  <div class="sheet">
    <div class="sheet-handle"><div></div></div>
    <div class="sheet-head">
      <div class="sheet-title">Adicionar desejo</div>
      <button class="sheet-close" onclick="closeWishSheet()">✕</button>
    </div>
    <div class="sheet-body" id="wish-sheet-body"></div>
    <div class="sheet-footer" id="wish-sheet-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Storage ──────────────────────────────────────────────────
const LS = {
  get:(k,fb)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
};

// ── Data ─────────────────────────────────────────────────────
const DAY=86400000, T=Date.now();
const SAMPLE_GAMES=[
  {id:1,name:"Pandemic",publisher:"Z-Man Games",players:"2-4",time:45,year:2008,rating:9,paid:180,market:220,category:"Cooperativo",notes:"Ótimo para iniciantes",img:"",wantToPlay:false,favorite:true,plays:[{date:T-3*DAY},{date:T-10*DAY},{date:T-20*DAY}]},
  {id:2,name:"Catan",publisher:"Devir",players:"3-4",time:90,year:1995,rating:7.5,paid:150,market:175,category:"Estratégia",notes:"",img:"",wantToPlay:true,favorite:false,plays:[{date:T-5*DAY},{date:T-40*DAY}]},
  {id:3,name:"Ticket to Ride",publisher:"Days of Wonder",players:"2-5",time:60,year:2004,rating:8.5,paid:200,market:240,category:"Família",notes:"Perfeito para família",img:"",wantToPlay:false,favorite:true,plays:[{date:T-180*DAY}]},
  {id:4,name:"Wingspan",publisher:"Stonemaier",players:"1-5",time:70,year:2019,rating:9.5,paid:320,market:390,category:"Estratégia",notes:"Arte lindíssima",img:"",wantToPlay:true,favorite:true,plays:[{date:T-1*DAY},{date:T-8*DAY},{date:T-22*DAY},{date:T-55*DAY}]},
  {id:5,name:"Dixit",publisher:"Libellud",players:"3-6",time:30,year:2008,rating:8,paid:130,market:148,category:"Party",notes:"",img:"",wantToPlay:false,favorite:false,plays:[{date:T-400*DAY}]},
  {id:6,name:"7 Wonders",publisher:"Repos",players:"2-7",time:30,year:2010,rating:8.5,paid:170,market:195,category:"Drafting",notes:"",img:"",wantToPlay:true,favorite:false,plays:[]},
];
const SAMPLE_WISH=[
  {id:1,name:"Gloomhaven",price:650,priority:"alta",note:"O melhor dungeon crawler"},
  {id:2,name:"Terraforming Mars",price:280,priority:"media",note:"Ótimas avaliações"},
];

let games = LS.get("bgc_games_v6", SAMPLE_GAMES);
let wishlist = LS.get("bgc_wish_v6", SAMPLE_WISH);
let currentTab = "colecao";
let searchVal = "";
let filterVal = "todos";
let statsSection = "jogados";
let editingGameId = null;
let gameStep = 0;
let gameImgTab = "upload";
let editingValueId = null;
let wishPriority = "media";

const saveGames = () => LS.set("bgc_games_v6", games);
const saveWish  = () => LS.set("bgc_wish_v6", wishlist);
const BRL = v => `R$ ${Number(v).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const daysSince = ts => ts ? Math.floor((Date.now()-ts)/DAY) : null;
const fmtDate = ts => ts ? new Date(ts).toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}) : "—";
const h = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
}

// ── Nav ───────────────────────────────────────────────────────
const TABS=[{k:"colecao",i:"♟",l:"Coleção"},{k:"stats",i:"📊",l:"Stats"},{k:"valor",i:"💰",l:"Valor"},{k:"desejos",i:"⭐",l:"Desejos"}];
function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(t=>`
    <button class="nav-btn${currentTab===t.k?" active":""}" onclick="setTab('${t.k}')">
      <span class="ico">${t.i}</span>
      <span>${t.l}</span>
      ${currentTab===t.k?'<div class="nav-dot"></div>':""}
    </button>`).join("");
}

function setTab(tab){
  currentTab=tab; editingValueId=null;
  document.getElementById("btn-header-add").style.display=(tab==="colecao"||tab==="desejos")?"block":"none";
  document.getElementById("btn-header-add").onclick = tab==="desejos" ? openWishSheet : openAddGame;
  renderNav(); renderContent(); renderHeader();
}

// ── Header ────────────────────────────────────────────────────
function renderHeader(){
  const totalPlays=games.reduce((a,g)=>a+(g.plays?.length||0),0);
  const avgR=games.length?(games.reduce((a,g)=>a+(g.rating||0),0)/games.length).toFixed(1):"—";
  const strip = document.getElementById("stats-strip");
  if(currentTab==="colecao"){
    strip.style.display="flex";
    strip.innerHTML=[[games.length,"jogos"],[totalPlays,"partidas"],[avgR,"nota média"]].map(([v,l])=>`
      <div class="stat-pill"><div class="val">${v}</div><div class="lbl">${l}</div></div>`).join("");
  } else { strip.style.display="none"; }
}

// ── Content router ────────────────────────────────────────────
function renderContent(){
  const el=document.getElementById("content");
  if(currentTab==="colecao") el.innerHTML=renderColecao();
  else if(currentTab==="stats") el.innerHTML=renderStats();
  else if(currentTab==="valor") el.innerHTML=renderValor();
  else if(currentTab==="desejos") el.innerHTML=renderDesejos();
}

// ── Coleção ───────────────────────────────────────────────────
function renderColecao(){
  const fil=games.filter(g=>{
    if(filterVal==="quero"&&!g.wantToPlay)return false;
    if(filterVal==="favoritos"&&!g.favorite)return false;
    if(searchVal&&!g.name.toLowerCase().includes(searchVal.toLowerCase())&&!(g.category||"").toLowerCase().includes(searchVal.toLowerCase()))return false;
    return true;
  });
  return `
    <input class="search-box" type="search" placeholder="🔍  Buscar jogo ou categoria..." value="${h(searchVal)}" oninput="searchVal=this.value;renderContent()" />
    <div class="filter-row">
      ${[["todos","Todos"],["quero","▶ Quero jogar"],["favoritos","★ Favoritos"]].map(([k,l])=>`
        <button class="filter-btn${filterVal===k?" active":""}" onclick="filterVal='${k}';renderContent()">${l}</button>`).join("")}
    </div>
    ${fil.length===0?`<div class="empty"><div class="ico">♟</div><div>Nenhum jogo encontrado</div></div>`:`
    <div class="game-grid">${fil.map(g=>renderGameCard(g)).join("")}</div>`}`;
}

function coverHtml(g,size=36){
  if(g.img) return `<img src="${h(g.img)}" alt="${h(g.name)}" onerror="this.style.display='none'" />`;
  return `<div class="cover-placeholder"><span style="font-size:${size}px">♟</span><span style="font-size:10px">sem capa</span></div>`;
}
function thumbHtml(g){
  return g.img?`<img src="${h(g.img)}" alt="${h(g.name)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:`<span>♟</span>`;
}

function renderGameCard(g){
  const lastPlay=g.plays?.length?Math.max(...g.plays.map(p=>p.date)):null;
  const days=daysSince(lastPlay);
  const isForgotten=g.plays?.length>0&&days>90;
  const isNever=!g.plays?.length;
  return `
  <div class="game-card${g.wantToPlay?" want":""}${isForgotten?" forgotten":""}">
    <div class="game-cover" onclick="openEditGame(${g.id})">
      ${coverHtml(g)}
      ${g.favorite?`<span class="badge badge-fav">★</span>`:""}
      ${g.wantToPlay?`<span class="badge badge-want">Quero jogar</span>`:""}
      ${isForgotten?`<span class="badge badge-bot badge-forgot">😴 esquecido</span>`:""}
      ${isNever?`<span class="badge badge-bot badge-never">nunca jogado</span>`:""}
    </div>
    <div class="game-info" onclick="openEditGame(${g.id})">
      <div class="game-name" title="${h(g.name)}">${h(g.name)}</div>
      <div class="game-meta">
        ${g.players?`<span>👥 ${g.players}</span>`:""}
        ${g.time?`<span>⏱ ${g.time}m</span>`:""}
      </div>
      <div class="game-sub">
        ${g.rating?`<span style="color:#f59e0b">★ ${g.rating}</span>`:""}
        <span style="color:#3a4a60">${g.plays?.length||0}× jogado</span>
      </div>
    </div>
    <div class="game-actions">
      <button class="act-play" onclick="logPlay(${g.id})">+▶</button>
      <button class="act-want${g.wantToPlay?" active":""}" onclick="toggleWant(${g.id})">▶</button>
      <button class="act-fav${g.favorite?" active":""}" onclick="toggleFav(${g.id})">★</button>
    </div>
  </div>`;
}

function toggleWant(id){const g=games.find(x=>x.id===id);if(g){g.wantToPlay=!g.wantToPlay;saveGames();renderContent();}}
function toggleFav(id){const g=games.find(x=>x.id===id);if(g){g.favorite=!g.favorite;saveGames();renderContent();}}
function logPlay(id){
  const g=games.find(x=>x.id===id);if(!g)return;
  if(!g.plays)g.plays=[];
  g.plays.push({date:Date.now()});
  saveGames();renderContent();renderHeader();
  showToast("✓ Partida de "+g.name+" registrada!");
}

// ── Stats ────────────────────────────────────────────────────
function renderStats(){
  const withP=games.filter(g=>g.plays?.length>0);
  const neverP=games.filter(g=>!g.plays?.length);
  const rc=Date.now()-30*DAY;
  const forgotten=withP.filter(g=>daysSince(Math.max(...g.plays.map(p=>p.date)))>90);
  const recent=withP.filter(g=>Math.max(...g.plays.map(p=>p.date))>rc).sort((a,b)=>Math.max(...b.plays.map(p=>p.date))-Math.max(...a.plays.map(p=>p.date)));
  const byP=[...withP].sort((a,b)=>b.plays.length-a.plays.length);
  const maxP=byP[0]?.plays.length||1;
  const topR=[...games].filter(g=>g.rating).sort((a,b)=>b.rating-a.rating).slice(0,6);
  const catMap={};games.forEach(g=>{const c=g.category||"Sem categoria";catMap[c]=(catMap[c]||0)+1;});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxC=cats[0]?.[1]||1;
  const totalP=games.reduce((a,g)=>a+(g.plays?.length||0),0);
  const pills=[["jogados","🎲 Mais jogados"],["recentes","🕐 Este mês"],["esquecidos","😴 Esquecidos"],["nunca","📦 Nunca jogados"],["categorias","🗂 Categorias"],["notas","⭐ Notas"]];

  let sectionHtml="";
  if(statsSection==="jogados"){
    sectionHtml = byP.length===0
      ? `<div style="text-align:center;padding:2rem 0;color:#64748b">Nenhuma partida ainda. Use +▶ nos cards!</div>`
      : byP.map((g,i)=>`
        <div class="bar-row">
          <span class="rank-num" style="color:${i<3?"#f59e0b":"#3a4a60"}">${i+1}</span>
          <div class="row-thumb">${thumbHtml(g)}</div>
          <div style="flex:1;min-width:0">
            <div class="row-name">${h(g.name)}</div>
            <div class="bar-track" style="margin-top:4px"><div class="bar-fill" style="width:${Math.round(g.plays.length/maxP*100)}%;background:#3b82f6"></div></div>
          </div>
          <div class="row-right">${g.plays.length}×</div>
        </div>`).join("");
  } else if(statsSection==="recentes"){
    sectionHtml = recent.length===0
      ? `<div style="text-align:center;padding:2rem 0;color:#64748b">Nenhum jogo este mês.</div>`
      : recent.map(g=>`
        <div class="game-row">
          <div class="row-thumb">${thumbHtml(g)}</div>
          <div class="row-info"><div class="row-name">${h(g.name)}</div><div class="row-sub">última: ${fmtDate(Math.max(...g.plays.map(p=>p.date)))}</div></div>
          <div class="row-right">${g.plays.filter(p=>p.date>rc).length}× este mês</div>
          <button class="btn-log" onclick="logPlay(${g.id})">+▶</button>
        </div>`).join("");
  } else if(statsSection==="esquecidos"){
    sectionHtml = forgotten.length===0
      ? `<div style="text-align:center;padding:2rem 0;color:#22c55e">🎉 Nenhum jogo esquecido!</div>`
      : [...forgotten].sort((a,b)=>Math.max(...a.plays.map(p=>p.date))-Math.max(...b.plays.map(p=>p.date))).map(g=>`
        <div class="game-row">
          <div class="row-thumb">${thumbHtml(g)}</div>
          <div class="row-info"><div class="row-name">${h(g.name)}</div><div class="row-sub">última: ${fmtDate(Math.max(...g.plays.map(p=>p.date)))}</div></div>
          <div class="row-right">${daysSince(Math.max(...g.plays.map(p=>p.date)))}d atrás</div>
          <button class="btn-log" onclick="logPlay(${g.id})">+▶</button>
        </div>`).join("");
  } else if(statsSection==="nunca"){
    sectionHtml = neverP.length===0
      ? `<div style="text-align:center;padding:2rem 0;color:#22c55e">🎉 Todos já foram jogados!</div>`
      : neverP.map(g=>`
        <div class="game-row">
          <div class="row-thumb">${thumbHtml(g)}</div>
          <div class="row-info"><div class="row-name">${h(g.name)}</div><div class="row-sub">${g.year||""} · ${g.category||""}</div></div>
          <button class="btn-log" onclick="logPlay(${g.id})">+▶</button>
        </div>`).join("");
  } else if(statsSection==="categorias"){
    sectionHtml = cats.map(([cat,cnt])=>`
      <div class="bar-row">
        <div style="font-size:13px;color:#e8f0fe;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(cat)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxC*100)}%;background:#8b5cf6"></div></div>
        <div class="row-right">${cnt}</div>
      </div>`).join("");
  } else if(statsSection==="notas"){
    sectionHtml = topR.map((g,i)=>`
      <div class="bar-row">
        <span class="rank-num" style="color:${i<3?"#f59e0b":"#3a4a60"}">${i+1}</span>
        <div class="row-thumb">${thumbHtml(g)}</div>
        <div style="flex:1;min-width:0">
          <div class="row-name">${h(g.name)}</div>
          <div class="bar-track" style="margin-top:4px"><div class="bar-fill" style="width:${Math.round(g.rating/10*100)}%;background:#f59e0b"></div></div>
        </div>
        <div class="row-right" style="color:#f59e0b">${g.rating}</div>
      </div>`).join("");
  }

  return `
    <div class="stat-cards">
      ${[[`#3b82f6`,"Total de partidas",totalP],[`#f59e0b`,"Nunca jogados",neverP.length],[`#a78bfa`,"Esquecidos",forgotten.length],[`#22c55e`,"Jogados este mês",recent.length]].map(([c,l,v])=>`
        <div class="stat-card" style="border:1px solid ${c}33">
          <div class="sc-lbl">${l}</div>
          <div class="sc-val" style="color:${c}">${v}</div>
        </div>`).join("")}
    </div>
    <div class="pill-row">
      ${pills.map(([k,l])=>`<button class="pill${statsSection===k?" active":""}" onclick="statsSection='${k}';renderContent()">${l}</button>`).join("")}
    </div>
    <div class="section-box">${sectionHtml}</div>`;
}

// ── Valor ────────────────────────────────────────────────────
function renderValor(){
  const tv=games.reduce((a,g)=>a+(g.market||g.paid||0),0);
  const tp=games.reduce((a,g)=>a+(g.paid||0),0);
  const tm=games.reduce((a,g)=>a+(g.market||0),0);
  const diff=tm-tp;
  const sorted=[...games].sort((a,b)=>(b.market||b.paid||0)-(a.market||a.paid||0));
  return `
    <div class="value-hero">
      <div class="value-total-lbl">Valor total da coleção</div>
      <div class="value-total">${BRL(tv)}</div>
      <div class="value-breakdown">
        <div class="vb-item"><div class="vb-lbl">Pago</div><div class="vb-val" style="color:#64748b">${BRL(tp)}</div></div>
        <div class="vb-item"><div class="vb-lbl">Mercado</div><div class="vb-val" style="color:#3b82f6">${BRL(tm)}</div></div>
        <div class="vb-item"><div class="vb-lbl">${diff>=0?"Valorização":"Desvalorização"}</div><div class="vb-val" style="color:${diff>=0?"#22c55e":"#f87171"}">${diff>=0?"+":""}${BRL(diff)}</div></div>
      </div>
    </div>
    ${sorted.map(g=>`
      <div class="val-row">
        <div class="row-thumb">${thumbHtml(g)}</div>
        <div class="row-info"><div class="row-name">${h(g.name)}</div><div class="row-sub">${g.paid?"pago: "+BRL(g.paid):""}</div></div>
        ${editingValueId===g.id?`
          <input class="val-edit-inp" type="number" id="val-inp-${g.id}" value="${g.market||g.paid||""}" inputmode="decimal" onkeydown="if(event.key==='Enter')saveValueInline(${g.id})" />
          <button class="val-ok" onclick="saveValueInline(${g.id})">Ok</button>
        `:`
          <div style="font-size:14px;font-weight:700;color:#e8f0fe">${BRL(g.market||g.paid||0)}</div>
          <button class="val-edit-btn" onclick="startEditValue(${g.id})">✎</button>
        `}
      </div>`).join("")}`;
}
function startEditValue(id){editingValueId=id;renderContent();setTimeout(()=>{const el=document.getElementById("val-inp-"+id);if(el)el.focus();},50);}
function saveValueInline(id){
  const el=document.getElementById("val-inp-"+id);
  const v=parseFloat(el?.value);
  if(!isNaN(v)){const g=games.find(x=>x.id===id);if(g){g.market=v;saveGames();}}
  editingValueId=null;renderContent();
}

// ── Desejos ──────────────────────────────────────────────────
function renderDesejos(){
  if(!wishlist.length) return `<div class="empty"><div class="ico">⭐</div><div>Lista vazia.</div><div style="margin-top:6px;font-size:13px">Adicione jogos que quer comprar!</div></div>`;
  const pColor={alta:"#f87171",media:"#f59e0b",baixa:"#22c55e"};
  return wishlist.map(w=>`
    <div class="wish-row">
      <div class="wish-dot" style="background:${pColor[w.priority]}"></div>
      <div style="flex:1">
        <div class="wish-name">${h(w.name)}</div>
        <div class="wish-sub">${w.price?BRL(w.price)+" · ":""}${h(w.note||"")}</div>
      </div>
      <button class="wish-del" onclick="removeWish(${w.id})">✕</button>
    </div>`).join("");
}
function removeWish(id){wishlist=wishlist.filter(w=>w.id!==id);saveWish();renderContent();}

// ── Game Sheet ────────────────────────────────────────────────
let gameFormData={};
function openAddGame(){editingGameId=null;gameStep=0;gameImgTab="upload";gameFormData={img:""};openGameSheet();}
function openEditGame(id){editingGameId=id;gameStep=0;gameImgTab="upload";const g=games.find(x=>x.id===id);gameFormData=g?{...g}:{img:""};openGameSheet();}
function openGameSheet(){
  document.getElementById("game-sheet-title").textContent=editingGameId?"Editar jogo":"Novo jogo";
  document.getElementById("game-sheet").classList.remove("hidden");
  renderGameSheet();
}
function closeGameSheet(){document.getElementById("game-sheet").classList.add("hidden");}

function renderGameSheet(){
  const STEPS=["📷 Capa","ℹ️ Info","💰 Valores"];
  const stepHtml=STEPS.map((s,i)=>`<button class="step-btn${gameStep===i?" active":""}" onclick="gameStep=${i};renderGameSheet()">${s}</button>`).join("");

  let bodyHtml="";
  if(gameStep===0){
    const imgSrc=gameFormData.img||"";
    const tabs=[["upload","📁 Galeria"],["url","🔗 URL"],["bgg","🌐 BGG"]];
    bodyHtml=`
      <div class="cover-preview">
        ${imgSrc?`<img src="${h(imgSrc)}" onerror="this.style.display='none'">`:`<div class="ph"><div style="font-size:48px">♟</div><div style="font-size:13px">sem imagem</div></div>`}
      </div>
      <div class="imgtabs">${tabs.map(([k,l])=>`<button class="imgtab${gameImgTab===k?" active":""}" onclick="gameImgTab='${k}';renderGameSheet()">${l}</button>`).join("")}</div>
      ${gameImgTab==="upload"?`
        <label class="upload-label">
          <span style="font-size:32px">📷</span>
          <span>Tirar foto ou escolher da galeria</span>
          <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleImgFile(this)">
        </label>`:""}
      ${gameImgTab==="url"?`
        <div class="field"><label>URL da imagem</label>
          <input class="finput" type="url" placeholder="https://..." value="${h(imgSrc)}" oninput="gameFormData.img=this.value;document.querySelector('.cover-preview img, .cover-preview .ph')&&renderGameSheet()" onblur="gameFormData.img=this.value;renderGameSheet()">
        </div>`:""}
      ${gameImgTab==="bgg"?`
        <div class="bgg-tip">
          1. Toque no botão abaixo para abrir o BGG<br>
          2. Encontre o jogo e segure o dedo na capa<br>
          3. Copie o endereço da imagem<br>
          4. Volte aqui e cole na aba <strong style="color:#e8f0fe">URL</strong>
        </div>
        <a href="https://boardgamegeek.com/search/boardgame?q=${encodeURIComponent(gameFormData.name||"")}" target="_blank" class="bgg-link">🔍 Abrir BGG ↗</a>`:""}
      ${imgSrc?`<button style="background:none;border:none;color:#f87171;font-size:14px;padding:8px 0;text-align:left" onclick="gameFormData.img='';renderGameSheet()">✕ Remover imagem</button>`:""}`;
  } else if(gameStep===1){
    const f=gameFormData;
    bodyHtml=`
      <div class="field"><label>Nome do jogo *</label><input class="finput" placeholder="Ex: Pandemic" value="${h(f.name||"")}" oninput="gameFormData.name=this.value" autofocus></div>
      <div class="field"><label>Editora</label><input class="finput" placeholder="Ex: Z-Man Games" value="${h(f.publisher||"")}" oninput="gameFormData.publisher=this.value"></div>
      <div class="grid2">
        <div class="field"><label>Jogadores</label><input class="finput" placeholder="Ex: 2-4" value="${h(f.players||"")}" oninput="gameFormData.players=this.value"></div>
        <div class="field"><label>Tempo (min)</label><input class="finput" type="number" inputmode="numeric" placeholder="Ex: 60" value="${f.time||""}" oninput="gameFormData.time=this.value"></div>
        <div class="field"><label>Ano</label><input class="finput" type="number" inputmode="numeric" placeholder="Ex: 2008" value="${f.year||""}" oninput="gameFormData.year=this.value"></div>
        <div class="field"><label>Nota (0–10)</label><input class="finput" type="number" inputmode="decimal" placeholder="Ex: 9" min="0" max="10" step="0.5" value="${f.rating||""}" oninput="gameFormData.rating=this.value"></div>
      </div>
      <div class="field"><label>Categoria / Mecânica</label><input class="finput" placeholder="Ex: Cooperativo, Estratégia..." value="${h(f.category||"")}" oninput="gameFormData.category=this.value"></div>
      <div class="field"><label>Notas pessoais</label><textarea class="finput" rows="3" placeholder="Impressões, com quem joga..." oninput="gameFormData.notes=this.value">${h(f.notes||"")}</textarea></div>`;
  } else {
    const f=gameFormData;
    const diff=Number(f.market||0)-Number(f.paid||0);
    bodyHtml=`
      <div style="background:#162035;border-radius:14px;padding:16px;font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px">Registre quanto pagou e o valor atual de mercado. A diferença mostra se valorizou ou não.</div>
      <div class="field"><label>Valor pago (R$)</label><input class="finput" type="number" inputmode="decimal" placeholder="Ex: 180" value="${f.paid||""}" oninput="gameFormData.paid=this.value;updateValuePreview()"></div>
      <div class="field"><label>Valor de mercado (R$)</label><input class="finput" type="number" inputmode="decimal" placeholder="Ex: 220" value="${f.market||""}" oninput="gameFormData.market=this.value;updateValuePreview()"></div>
      ${f.paid&&f.market?`<div id="val-preview" style="background:${diff>=0?"#052e16":"#2a0a0a"};border:1px solid ${diff>=0?"#166534":"#f87171"};border-radius:14px;padding:16px;text-align:center;margin-top:4px">
        <div style="font-size:12px;color:#64748b">Variação</div>
        <div style="font-size:22px;font-weight:700;color:${diff>=0?"#22c55e":"#f87171"}">${diff>=0?"+":""}${BRL(diff)}</div>
      </div>`:"<div id='val-preview'></div>"}`;
  }

  let footerHtml=`<div class="steps">${stepHtml}</div>`;
  if(gameStep<2) footerHtml+=`<button class="bbtn bbtn-blue" onclick="gameStep++;renderGameSheet()">Próximo →</button>`;
  else footerHtml+=`<button class="bbtn bbtn-green" onclick="saveGame()">💾 Salvar jogo</button>`;
  if(gameStep>0) footerHtml+=`<button class="bbtn bbtn-gray" onclick="gameStep--;renderGameSheet()">← Voltar</button>`;
  if(editingGameId) footerHtml+=`<button class="bbtn bbtn-green" onclick="logPlay(${editingGameId});closeGameSheet()">+▶ Registrar partida agora</button>`;
  if(editingGameId&&gameStep===2) footerHtml+=`<button class="bbtn bbtn-red" onclick="deleteGame(${editingGameId})">🗑 Remover da coleção</button>`;

  document.getElementById("game-sheet-body").innerHTML=bodyHtml;
  document.getElementById("game-sheet-footer").innerHTML=footerHtml;
}

function updateValuePreview(){
  const diff=Number(gameFormData.market||0)-Number(gameFormData.paid||0);
  const el=document.getElementById("val-preview");
  if(el&&gameFormData.paid&&gameFormData.market){
    el.style.background=diff>=0?"#052e16":"#2a0a0a";
    el.style.border=`1px solid ${diff>=0?"#166534":"#f87171"}`;
    el.innerHTML=`<div style="font-size:12px;color:#64748b">Variação</div><div style="font-size:22px;font-weight:700;color:${diff>=0?"#22c55e":"#f87171"}">${diff>=0?"+":""}${BRL(diff)}</div>`;
  }
}

function handleImgFile(input){
  const file=input.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{gameFormData.img=e.target.result;renderGameSheet();};
  reader.readAsDataURL(file);
}

function saveGame(){
  if(!gameFormData.name?.trim()) return alert("Informe o nome do jogo.");
  const data={
    name:gameFormData.name?.trim()||"",publisher:gameFormData.publisher?.trim()||"",
    players:gameFormData.players?.trim()||"",time:Number(gameFormData.time)||0,
    year:Number(gameFormData.year)||0,rating:Number(gameFormData.rating)||0,
    paid:Number(gameFormData.paid)||0,market:Number(gameFormData.market)||0,
    category:gameFormData.category?.trim()||"",notes:gameFormData.notes?.trim()||"",
    img:gameFormData.img||"",
  };
  if(editingGameId){
    const idx=games.findIndex(g=>g.id===editingGameId);
    if(idx>=0) games[idx]={...games[idx],...data};
  } else {
    games.push({...data,id:Date.now(),wantToPlay:false,favorite:false,plays:[]});
  }
  saveGames();closeGameSheet();renderContent();renderHeader();
}

function deleteGame(id){
  if(!confirm("Remover este jogo da coleção?"))return;
  games=games.filter(g=>g.id!==id);saveGames();closeGameSheet();renderContent();renderHeader();
}

// ── Wish Sheet ────────────────────────────────────────────────
function openWishSheet(){
  wishPriority="media";
  document.getElementById("wish-sheet").classList.remove("hidden");
  renderWishSheet();
}
function closeWishSheet(){document.getElementById("wish-sheet").classList.add("hidden");}
function renderWishSheet(){
  const pColors={alta:"#f87171",media:"#f59e0b",baixa:"#22c55e"};
  document.getElementById("wish-sheet-body").innerHTML=`
    <div class="field"><label>Nome do jogo *</label><input class="finput" id="w-name" placeholder="Ex: Gloomhaven" autofocus></div>
    <div class="field"><label>Preço estimado (R$)</label><input class="finput" id="w-price" type="number" inputmode="decimal" placeholder="Ex: 400"></div>
    <div class="field"><label>Prioridade</label>
      <div class="pri-row">
        ${[["alta","🔴 Alta"],["media","🟡 Média"],["baixa","🟢 Baixa"]].map(([k,l])=>`
          <button class="pri-btn" id="pri-${k}" style="border-color:${wishPriority===k?pColors[k]:"#1e2d45"};background:${wishPriority===k?pColors[k]+"22":"#162035"};color:${wishPriority===k?pColors[k]:"#64748b"};font-weight:${wishPriority===k?700:400}" onclick="setPriority('${k}')">${l}</button>`).join("")}
      </div>
    </div>
    <div class="field"><label>Observação</label><input class="finput" id="w-note" placeholder="Por que quer esse jogo?"></div>`;
  document.getElementById("wish-sheet-footer").innerHTML=`<button class="bbtn bbtn-blue" onclick="saveWishItem()">Adicionar à lista</button>`;
}
function setPriority(p){
  wishPriority=p;renderWishSheet();
  // restore typed values
}
function saveWishItem(){
  const name=document.getElementById("w-name")?.value?.trim();
  if(!name)return alert("Informe o nome.");
  wishlist.push({id:Date.now(),name,price:Number(document.getElementById("w-price")?.value)||0,priority:wishPriority,note:document.getElementById("w-note")?.value?.trim()||""});
  saveWish();closeWishSheet();renderContent();
}

// ── Init ──────────────────────────────────────────────────────
function init(){
  renderNav();renderHeader();renderContent();
  document.getElementById("btn-header-add").onclick=openAddGame;
}
init();
</script>
</body>
